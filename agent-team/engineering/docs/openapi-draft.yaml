openapi: 3.1.0
info:
  title: AI Multi-Agent Console API Draft
  version: 0.1.0
  description: Draft API contract for AI multi-agent web console M1.
servers:
  - url: /api
paths:
  /agents:
    get:
      summary: List agents
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [online, offline, busy, idle, degraded]
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSummary'
  /agents/{agentId}:
    get:
      summary: Get agent detail
      parameters:
        - in: path
          name: agentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDetail'
  /agents/{agentId}/events:
    get:
      summary: List agent events
      parameters:
        - in: path
          name: agentId
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Agent events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
  /conversations:
    get:
      summary: List conversations
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [direct, broadcast]
        - in: query
          name: agentId
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
    post:
      summary: Create conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Created conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ConversationSummary'
  /conversations/{conversationId}/messages:
    get:
      summary: List conversation messages
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
  /messages:
    post:
      summary: Send message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Accepted dispatch task
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DispatchAccepted'
  /dispatch-tasks/{taskId}:
    get:
      summary: Get dispatch task status
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dispatch task detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DispatchTask'
  /internal/adapter/events:
    post:
      summary: Ingest adapter events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdapterEventIngestRequest'
      responses:
        '200':
          description: Ingest result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IngestResult'
  /internal/adapter/agents/snapshot:
    post:
      summary: Ingest agent snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSnapshotRequest'
      responses:
        '200':
          description: Snapshot ingest result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accepted:
                        type: integer
components:
  schemas:
    AgentSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string }
        profileName: { type: string }
        status:
          type: string
          enum: [online, offline, busy, idle, degraded]
        currentSessionId:
          type: [string, 'null']
        lastSeenAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
        capabilities:
          type: array
          items: { type: string }
      required: [id, name, role, profileName, status, lastSeenAt, unreadCount, capabilities]
    AgentDetail:
      allOf:
        - $ref: '#/components/schemas/AgentSummary'
        - type: object
          properties:
            profilePath: { type: string }
            summary: { type: string }
          required: [profilePath, summary]
    ConversationSummary:
      type: object
      properties:
        id: { type: string }
        scope:
          type: string
          enum: [direct, broadcast]
        title: { type: string }
        participantAgentIds:
          type: array
          items: { type: string }
        lastMessagePreview:
          type: [string, 'null']
        lastMessageAt:
          type: [string, 'null']
          format: date-time
        unreadCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, scope, title, participantAgentIds]
    Message:
      type: object
      properties:
        id: { type: string }
        conversationId: { type: string }
        senderType:
          type: string
          enum: [user, agent, system]
        senderId: { type: string }
        content: { type: string }
        contentFormat:
          type: string
          enum: [text]
        seq: { type: integer }
        createdAt:
          type: string
          format: date-time
        deliveryStatus:
          type: string
      required: [id, conversationId, senderType, senderId, content, contentFormat, seq, createdAt]
    EventEnvelope:
      type: object
      properties:
        eventId: { type: string }
        type: { type: string }
        agentId:
          type: [string, 'null']
        conversationId:
          type: [string, 'null']
        occurredAt:
          type: string
          format: date-time
        sourceId:
          type: [string, 'null']
        payload:
          type: object
          additionalProperties: true
      required: [eventId, type, occurredAt, payload]
    DispatchTarget:
      type: object
      properties:
        agentId: { type: string }
        status: { type: string }
        errorMessage:
          type: [string, 'null']
        deliveredAt:
          type: [string, 'null']
          format: date-time
      required: [agentId, status]
    DispatchTask:
      type: object
      properties:
        id: { type: string }
        targetScope:
          type: string
          enum: [direct, broadcast]
        status:
          type: string
          enum: [pending, running, succeeded, partial_failed, failed]
        createdAt:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: '#/components/schemas/DispatchTarget'
      required: [id, targetScope, status, createdAt, targets]
    DispatchAccepted:
      type: object
      properties:
        dispatchTaskId: { type: string }
        conversationId: { type: string }
        acceptedTargetCount: { type: integer }
        status: { type: string }
      required: [dispatchTaskId, conversationId, acceptedTargetCount, status]
    CreateConversationRequest:
      type: object
      properties:
        scope:
          type: string
          enum: [direct, broadcast]
        title: { type: string }
        participantAgentIds:
          type: array
          items: { type: string }
      required: [scope, title, participantAgentIds]
    SendMessageRequest:
      type: object
      properties:
        targetScope:
          type: string
          enum: [direct, broadcast]
        targetIds:
          type: array
          items: { type: string }
        conversationId: { type: string }
        content: { type: string }
        contentFormat:
          type: string
          enum: [text]
      required: [targetScope, content, contentFormat]
    AdapterEventIngestRequest:
      type: object
      properties:
        source: { type: string }
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
      required: [source, events]
    AgentSnapshotItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status:
          type: string
          enum: [online, offline, busy, idle, degraded]
        currentSessionId:
          type: [string, 'null']
        lastSeenAt:
          type: string
          format: date-time
      required: [id, name, status, lastSeenAt]
    AgentSnapshotRequest:
      type: object
      properties:
        capturedAt:
          type: string
          format: date-time
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentSnapshotItem'
      required: [capturedAt, agents]
    IngestResult:
      type: object
      properties:
        accepted: { type: integer }
        deduplicated: { type: integer }
        failed: { type: integer }
      required: [accepted, deduplicated, failed]
    Pagination:
      type: object
      properties:
        nextCursor:
          type: [string, 'null']
        hasMore:
          type: boolean
      required: [nextCursor, hasMore]
    EventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventEnvelope'
        page:
          $ref: '#/components/schemas/Pagination'
      required: [data, page]
    ConversationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSummary'
        page:
          $ref: '#/components/schemas/Pagination'
      required: [data, page]
    MessageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        page:
          $ref: '#/components/schemas/Pagination'
      required: [data, page]
